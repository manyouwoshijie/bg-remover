<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google OAuth 登录示例</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.container {
  background: white;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  max-width: 400px;
  width: 90%;
  text-align: center;
}
h1 { color: #333; margin-bottom: 10px; font-size: 24px; }
.subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
#loginBtn {
  background: #4285f4;
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 0 auto;
}
#loginBtn:hover { background: #357ae8; }
.user-info { display: none; }
.user-info.show { display: block; }
.avatar { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 15px; }
#logoutBtn {
  background: #dc3545;
  color: white;
  border: none;
  padding: 8px 20px;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 20px;
}
</style>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<div class="container">
  <h1>Google OAuth 登录</h1>
  <p class="subtitle">使用 Google 账号登录</p>
  
  <div id="loginSection">
    <div id="g_id_onload"
         data-client_id="YOUR_CLIENT_ID.apps.googleusercontent.com"
         data-callback="handleCredentialResponse">
    </div>
    <div class="g_id_signin" data-type="standard"></div>
  </div>
  
  <div class="user-info" id="userInfo">
    <img class="avatar" id="avatar" src="" alt="头像">
    <h2 id="userName"></h2>
    <p id="userEmail"></p>
    <button id="logoutBtn" onclick="logout()">退出登录</button>
  </div>
</div>

<script>
function handleCredentialResponse(response) {
  const token = response.credential;
  const payload = JSON.parse(atob(token.split('.')[1]));
  
  document.getElementById('avatar').src = payload.picture;
  document.getElementById('userName').textContent = payload.name;
  document.getElementById('userEmail').textContent = payload.email;
  
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('userInfo').classList.add('show');
  
  localStorage.setItem('user', JSON.stringify(payload));
}

function logout() {
  google.accounts.id.disableAutoSelect();
  localStorage.removeItem('user');
  document.getElementById('loginSection').style.display = 'block';
  document.getElementById('userInfo').classList.remove('show');
}

window.onload = function() {
  const user = localStorage.getItem('user');
  if (user) {
    const payload = JSON.parse(user);
    document.getElementById('avatar').src = payload.picture;
    document.getElementById('userName').textContent = payload.name;
    document.getElementById('userEmail').textContent = payload.email;
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('userInfo').classList.add('show');
  }
};
</script>

</body>
</html>
