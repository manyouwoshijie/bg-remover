<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>魂斗罗</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; }
canvas { border: 2px solid #444; image-rendering: pixelated; }
#ui { color: #fff; display: flex; gap: 40px; margin-bottom: 8px; font-size: 14px; }
#msg { color: #ff0; font-size: 16px; margin-top: 8px; min-height: 20px; }
#controls { color: #888; font-size: 12px; margin-top: 6px; }
</style>
</head>
<body>
<div id="ui">
  <span>SCORE: <b id="score">0</b></span>
  <span>LIVES: <b id="lives">3</b></span>
  <span>STAGE: <b id="stage">1</b></span>
</div>
<canvas id="c" width="480" height="320"></canvas>
<div id="msg"></div>
<div id="controls">← → 移动 | Z 跳跃 | X 射击 | ↑ 向上射击</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 480, H = 320;

// ---- Audio ----
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  if (type === 'shoot') {
    osc.type = 'square';
    osc.frequency.setValueAtTime(880, now);
    osc.frequency.exponentialRampToValueAtTime(220, now + 0.08);
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    osc.start(now); osc.stop(now + 0.08);
  } else if (type === 'jump') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(300, now);
    osc.frequency.exponentialRampToValueAtTime(600, now + 0.12);
    gain.gain.setValueAtTime(0.12, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    osc.start(now); osc.stop(now + 0.15);
  } else if (type === 'hit') {
    // enemy hit
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(440, now);
    osc.frequency.exponentialRampToValueAtTime(110, now + 0.1);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    osc.start(now); osc.stop(now + 0.1);
  } else if (type === 'explode') {
    // enemy explode - noise-like
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.2, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const g2 = audioCtx.createGain();
    g2.gain.setValueAtTime(0.3, now);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    src.connect(g2); g2.connect(audioCtx.destination);
    src.start(now); src.stop(now + 0.2);
    return;
  } else if (type === 'die') {
    // player die
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(600, now);
    osc.frequency.exponentialRampToValueAtTime(80, now + 0.5);
    gain.gain.setValueAtTime(0.25, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    osc.start(now); osc.stop(now + 0.5);
  } else if (type === 'clear') {
    // stage clear jingle
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'square';
      o.frequency.value = freq;
      const t = now + i * 0.12;
      g.gain.setValueAtTime(0.15, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      o.start(t); o.stop(t + 0.15);
    });
    return;
  } else if (type === 'enemy_shoot') {
    osc.type = 'square';
    osc.frequency.setValueAtTime(200, now);
    osc.frequency.exponentialRampToValueAtTime(100, now + 0.06);
    gain.gain.setValueAtTime(0.08, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
    osc.start(now); osc.stop(now + 0.06);
  }
}

// Unlock audio on first interaction
document.addEventListener('keydown', () => {
  if (audioCtx.state === 'suspended') audioCtx.resume();
}, { once: true });

// ---- Input ----
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ---- Game State ----
let score = 0, lives = 3, stage = 1, gameOver = false, stageClear = false;
let player, bullets, enemies, enemyBullets, particles, platforms, ground;

function initStage() {
  stageClear = false;
  platforms = [
    { x: 80,  y: 220, w: 80, h: 12 },
    { x: 220, y: 180, w: 80, h: 12 },
    { x: 340, y: 140, w: 80, h: 12 },
    { x: 160, y: 260, w: 60, h: 12 },
    { x: 360, y: 240, w: 60, h: 12 },
  ];
  ground = { x: 0, y: H - 20, w: W, h: 20 };

  player = {
    x: 40, y: H - 60, w: 12, h: 20,
    vx: 0, vy: 0,
    onGround: false,
    dir: 1,
    aimUp: false,
    shootCooldown: 0,
    invincible: 0,
    dead: false,
  };

  bullets = [];
  enemyBullets = [];
  particles = [];

  enemies = [];
  const count = 4 + stage * 2;
  for (let i = 0; i < count; i++) {
    enemies.push(spawnEnemy(i, count));
  }
}

function spawnEnemy(i, total) {
  const x = 200 + (i / total) * 240;
  const types = ['soldier', 'soldier', 'turret'];
  const type = types[i % types.length];
  return {
    x, y: H - 40,
    w: 12, h: 18,
    vx: type === 'turret' ? 0 : (Math.random() > 0.5 ? 0.4 : -0.4),
    vy: 0,
    hp: type === 'turret' ? 3 : 1,
    type,
    shootTimer: 80 + Math.random() * 120,
    onGround: false,
    dir: -1,
  };
}

// ---- Physics ----
function rectOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

function resolveGround(obj) {
  obj.onGround = false;
  const all = [ground, ...platforms];
  for (const p of all) {
    if (obj.x + obj.w > p.x && obj.x < p.x + p.w &&
        obj.y + obj.h > p.y && obj.y + obj.h < p.y + p.h + 8 &&
        obj.vy >= 0) {
      obj.y = p.y - obj.h;
      obj.vy = 0;
      obj.onGround = true;
    }
  }
  if (obj.x < 0) obj.x = 0;
  if (obj.x + obj.w > W) obj.x = W - obj.w;
  if (obj.y < 0) { obj.y = 0; obj.vy = 0; }
}

// ---- Update ----
let jumpPressed = false;

function update() {
  if (gameOver || stageClear) return;

  const p = player;
  if (p.dead) return;

  p.aimUp = keys['ArrowUp'];

  // 速度调慢：从 2.5 → 1.8
  if (keys['ArrowLeft'])       { p.vx = -1.8; p.dir = -1; }
  else if (keys['ArrowRight']) { p.vx =  1.8; p.dir =  1; }
  else p.vx *= 0.7;

  if ((keys['KeyZ'] || keys['Space']) && p.onGround && !jumpPressed) {
    p.vy = -6.5;
    jumpPressed = true;
    playSound('jump');
  }
  if (!keys['KeyZ'] && !keys['Space']) jumpPressed = false;

  p.vy += 0.32;
  p.x += p.vx;
  p.y += p.vy;
  resolveGround(p);

  if (p.y > H + 20) { loseLife(); return; }

  // Shoot
  if (p.shootCooldown > 0) p.shootCooldown--;
  if ((keys['KeyX'] || keys['ControlLeft']) && p.shootCooldown === 0) {
    p.shootCooldown = 14;
    // 子弹速度也稍慢：6 → 5
    const bvx = p.aimUp ? 0 : p.dir * 5;
    const bvy = p.aimUp ? -5 : 0;
    bullets.push({ x: p.x + p.w / 2, y: p.y + (p.aimUp ? 0 : p.h / 2), vx: bvx, vy: bvy, life: 70 });
    playSound('shoot');
  }

  if (p.invincible > 0) p.invincible--;

  // Player bullets
  bullets = bullets.filter(b => {
    b.x += b.vx; b.y += b.vy; b.life--;
    return b.life > 0 && b.x > 0 && b.x < W && b.y > 0 && b.y < H;
  });

  // Enemy bullets
  enemyBullets = enemyBullets.filter(b => {
    b.x += b.vx; b.y += b.vy; b.life--;
    if (b.life <= 0 || b.x < 0 || b.x > W || b.y < 0 || b.y > H) return false;
    if (!p.dead && p.invincible === 0 && rectOverlap(b, { x: p.x, y: p.y, w: p.w, h: p.h })) {
      loseLife(); return false;
    }
    return true;
  });

  // Enemies
  for (const e of enemies) {
    if (e.type !== 'turret') {
      e.vx = e.dir * 0.6;
      e.vy += 0.32;
      e.x += e.vx;
      e.y += e.vy;
      resolveGround(e);
      if (e.x <= 0 || e.x + e.w >= W) e.dir *= -1;
      if (e.y > H + 20) e.y = H - 40;
    }

    e.shootTimer--;
    if (e.shootTimer <= 0) {
      e.shootTimer = 90 + Math.random() * 110;
      const dx = p.x - e.x, dy = p.y - e.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const spd = 2.5; // 敌人子弹也慢一点
      enemyBullets.push({ x: e.x + e.w / 2, y: e.y + e.h / 2, vx: dx / dist * spd, vy: dy / dist * spd, life: 100, w: 4, h: 4 });
      playSound('enemy_shoot');
    }

    // Bullet hits enemy
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      if (rectOverlap({ x: b.x - 3, y: b.y - 3, w: 6, h: 6 }, { x: e.x, y: e.y, w: e.w, h: e.h })) {
        bullets.splice(i, 1);
        e.hp--;
        playSound('hit');
        spawnParticles(e.x + e.w / 2, e.y + e.h / 2, '#f80');
        if (e.hp <= 0) {
          playSound('explode');
          spawnParticles(e.x + e.w / 2, e.y + e.h / 2, '#f00', 12);
          score += e.type === 'turret' ? 300 : 100;
          document.getElementById('score').textContent = score;
        }
      }
    }

    // Touch player
    if (!p.dead && p.invincible === 0 && rectOverlap({ x: p.x, y: p.y, w: p.w, h: p.h }, { x: e.x, y: e.y, w: e.w, h: e.h })) {
      loseLife();
    }
  }

  enemies = enemies.filter(e => e.hp > 0);

  for (const pt of particles) { pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.1; pt.life--; }
  particles = particles.filter(pt => pt.life > 0);

  if (enemies.length === 0) {
    stageClear = true;
    playSound('clear');
    document.getElementById('msg').textContent = `STAGE ${stage} CLEAR! 按 Enter 继续`;
  }
}

function loseLife() {
  lives--;
  document.getElementById('lives').textContent = lives;
  playSound('die');
  spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#0ff', 16);
  if (lives <= 0) {
    gameOver = true;
    document.getElementById('msg').textContent = 'GAME OVER — 按 Enter 重新开始';
  } else {
    player.x = 40; player.y = H - 60;
    player.vx = 0; player.vy = 0;
    player.invincible = 120;
  }
}

function spawnParticles(x, y, color, n = 6) {
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 1 + Math.random() * 3;
    particles.push({ x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 1, life: 20 + Math.random() * 20, color });
  }
}

// ---- Draw ----
function draw() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#ffffff22';
  for (let i = 0; i < 40; i++) {
    const sx = (i * 137 + stage * 17) % W;
    const sy = (i * 97) % (H - 30);
    ctx.fillRect(sx, sy, 1, 1);
  }

  ctx.fillStyle = '#3a5a2a';
  ctx.fillRect(ground.x, ground.y, ground.w, ground.h);
  ctx.fillStyle = '#4a7a3a';
  ctx.fillRect(ground.x, ground.y, ground.w, 3);

  for (const p of platforms) {
    ctx.fillStyle = '#5a4a2a';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = '#7a6a3a';
    ctx.fillRect(p.x, p.y, p.w, 3);
  }

  ctx.fillStyle = '#ff4400';
  for (const b of enemyBullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = '#ffff00';
  for (const b of bullets) {
    ctx.fillRect(b.x - 3, b.y - 2, 6, 4);
  }

  for (const e of enemies) {
    if (e.type === 'turret') {
      ctx.fillStyle = '#884400';
      ctx.fillRect(e.x, e.y + 8, e.w, e.h - 8);
      ctx.fillStyle = '#cc6600';
      ctx.fillRect(e.x + 2, e.y, e.w - 4, 10);
      ctx.fillStyle = '#aaa';
      const pl = player;
      const dx = pl.x - e.x, dy = pl.y - e.y;
      const angle = Math.atan2(dy, dx);
      ctx.save();
      ctx.translate(e.x + e.w / 2, e.y + 5);
      ctx.rotate(angle);
      ctx.fillRect(0, -2, 10, 4);
      ctx.restore();
    } else {
      ctx.fillStyle = '#cc2200';
      ctx.fillRect(e.x + 2, e.y + 6, e.w - 4, e.h - 6);
      ctx.fillStyle = '#ffcc88';
      ctx.fillRect(e.x + 3, e.y, e.w - 6, 8);
      ctx.fillStyle = '#884400';
      ctx.fillRect(e.x + 2, e.y - 2, e.w - 4, 5);
      ctx.fillStyle = '#555';
      if (e.dir > 0) ctx.fillRect(e.x + e.w, e.y + 8, 6, 3);
      else ctx.fillRect(e.x - 6, e.y + 8, 6, 3);
    }
  }

  const p = player;
  if (!p.dead && (p.invincible === 0 || Math.floor(p.invincible / 4) % 2 === 0)) {
    ctx.fillStyle = '#2266cc';
    ctx.fillRect(p.x + 1, p.y + 8, p.w - 2, p.h - 8);
    ctx.fillStyle = '#ffcc88';
    ctx.fillRect(p.x + 2, p.y + 1, p.w - 4, 8);
    ctx.fillStyle = '#cc4400';
    ctx.fillRect(p.x + 1, p.y - 1, p.w - 2, 5);
    ctx.fillStyle = '#888';
    if (p.aimUp) {
      ctx.fillRect(p.x + p.w / 2 - 1, p.y - 6, 3, 8);
    } else {
      if (p.dir > 0) ctx.fillRect(p.x + p.w, p.y + 6, 7, 3);
      else ctx.fillRect(p.x - 7, p.y + 6, 7, 3);
    }
  }

  for (const pt of particles) {
    ctx.globalAlpha = pt.life / 40;
    ctx.fillStyle = pt.color;
    ctx.fillRect(pt.x - 2, pt.y - 2, 4, 4);
  }
  ctx.globalAlpha = 1;

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#f00';
    ctx.font = 'bold 32px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W / 2, H / 2);
  } else if (stageClear) {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff0';
    ctx.font = 'bold 28px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`STAGE ${stage} CLEAR!`, W / 2, H / 2);
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Enter') {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (gameOver) {
      score = 0; lives = 3; stage = 1;
      document.getElementById('score').textContent = 0;
      document.getElementById('lives').textContent = 3;
      document.getElementById('stage').textContent = 1;
      document.getElementById('msg').textContent = '';
      gameOver = false;
      initStage();
    } else if (stageClear) {
      stage++;
      document.getElementById('stage').textContent = stage;
      document.getElementById('msg').textContent = '';
      initStage();
    }
  }
});

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

initStage();
loop();
</script>
</body>
</html>
